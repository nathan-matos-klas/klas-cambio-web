<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Câmbio Klass</title>
<style>
  :root {
    --ink: #0f3f7a;
    --line: #dedede;
    --bg: #ffffff;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: linear-gradient(180deg, #fafafa 0%, #ffffff 45%, #f6f6f3 100%);
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    color: var(--ink);
  }

  body {
    display: grid;
    place-items: center;
  }

  .frame {
    width: min(1180px, 100vw);
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    box-sizing: border-box;
    padding: 18px 16px 10px;
  }

  .card {
    background: var(--bg);
    border: 1px solid #d9d9d9;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02) inset;
    display: grid;
    grid-template-rows: auto auto 1fr;
    overflow: hidden;
  }

  .summary {
    display: grid;
    gap: 10px;
    padding: 20px 24px;
    border-bottom: 2px solid var(--line);
    background: linear-gradient(180deg, #fbfcfe 0%, #f5f8fc 100%);
  }

  .summary-label {
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
  }

  .summary-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .currency-select {
    min-width: 220px;
    padding: 12px 14px;
    border: 1px solid #cfd9e6;
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    font: inherit;
  }

  .summary-value {
    font-size: clamp(1.9rem, 3.5vw, 3rem);
    font-weight: 700;
    line-height: 1;
  }

  .summary-caption {
    font-size: 0.98rem;
    opacity: 0.82;
  }

  .selected-row {
    background: rgba(15, 63, 122, 0.06);
  }

  .table {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }

  .cell {
    padding: 22px 24px;
    border-bottom: 2px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-sizing: border-box;
  }

  .header {
    font-size: clamp(2.2rem, 4vw, 4rem);
    font-weight: 600;
    line-height: 1;
    min-height: 128px;
    position: relative;
  }

  .header.left {
    border-right: 2px solid var(--line);
  }

  .header.left::after {
    content: "";
    position: absolute;
    left: 22px;
    bottom: 18px;
    width: 0;
    height: 0;
    border-left: 26px solid transparent;
    border-right: 26px solid transparent;
    border-bottom: 26px solid var(--ink);
  }

  .row .left {
    border-right: 2px solid var(--line);
    font-size: clamp(1.65rem, 3vw, 3.15rem);
    font-weight: 400;
  }

  .row .right {
    font-size: clamp(1.65rem, 3vw, 3.15rem);
    font-weight: 400;
  }

  .footer {
    text-align: center;
    padding: 14px 8px 0;
    font-size: clamp(1rem, 1.8vw, 1.6rem);
    color: var(--ink);
  }

  .status {
    text-align: center;
    padding: 8px 8px 0;
    font-size: 0.95rem;
    color: rgba(15, 63, 122, 0.8);
    min-height: 1.4em;
  }

  @media (max-width: 820px) {
    .frame {
      padding: 8px;
    }

    .cell {
      padding: 18px 14px;
    }

    .header.left::after {
      left: 16px;
      bottom: 14px;
      border-left-width: 18px;
      border-right-width: 18px;
      border-bottom-width: 18px;
    }
  }

  @media (max-width: 640px) {
    .table {
      grid-template-columns: 1fr;
    }

    .header.left,
    .row .left {
      border-right: 0;
    }

    .header.left::after {
      display: none;
    }

    .cell {
      border-bottom: 1px solid var(--line);
    }
  }
</style>
</head>
<body>
  <main class="frame">
    <section class="card" aria-label="Tabela de câmbio">
      <div class="summary">
        <div class="summary-label">Valor em BRL da moeda selecionada</div>
        <div class="summary-row">
          <select id="currency-select" class="currency-select" aria-label="Selecionar moeda"></select>
          <div class="summary-value" id="brl-value">R$ --</div>
        </div>
        <div class="summary-caption" id="brl-caption">Selecione uma moeda para ver a equivalência em reais.</div>
      </div>

      <div class="table">
        <div class="cell header left">Moeda</div>
        <div class="cell header">Câmbio Klas</div>

        <div class="cell row left" id="label-usd">Dólar (USD)</div>
        <div class="cell row right" id="rate-usd">R$5,34</div>

        <div class="cell row left" id="label-eur">Euro (EUR)</div>
        <div class="cell row right" id="rate-eur">R$6,17</div>

        <div class="cell row left" id="label-gbp">Libra (GBP)</div>
        <div class="cell row right" id="rate-gbp">R$7,16</div>

        <div class="cell row left" id="label-aed">Dirham (AED)</div>
        <div class="cell row right" id="rate-aed">R$1,46</div>

        <div class="cell row left" id="label-zar">Rand (ZAR)</div>
        <div class="cell row right" id="rate-zar">R$0,32</div>
      </div>
    </section>

    <div class="status" id="status">Carregando dados da API...</div>
    <div class="footer">Atualizado em: 12/06/26 11:50</div>
  </main>

  <script>
    const LOCAL_API_URL = "http://127.0.0.1:8000/api/cambio";
    const GITHUB_CACHE_URL = "./cambio_cache.json";
    const API_URL = (location.protocol === "file:" || location.hostname === "127.0.0.1" || location.hostname === "localhost")
      ? LOCAL_API_URL
      : GITHUB_CACHE_URL;
    const fallbackLabels = {
      USD: "Dólar (USD)",
      EUR: "Euro (EUR)",
      GBP: "Libra (GBP)",
      AED: "Dirham (AED)",
      ZAR: "Rand (ZAR)"
    };
    const currencyOrder = ["USD", "EUR", "GBP", "AED", "ZAR"];
    let currentPayload = null;

    function formatCurrency(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return "--";
      }
      return `R$${number.toFixed(2).replace(".", ",")}`;
    }

    function formatTimestamp(value) {
      if (!value) {
        return "indisponível";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat("pt-BR", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(date);
    }

    function applyRates(payload) {
      currentPayload = payload;
      const rates = Array.isArray(payload?.rates) ? payload.rates : [];
      const byCode = new Map(rates.map((item) => [String(item.code || "").toUpperCase(), item]));
      const select = document.getElementById("currency-select");

      if (select && !select.options.length) {
        for (const code of currencyOrder) {
          const option = document.createElement("option");
          option.value = code;
          option.textContent = byCode.get(code)?.name || fallbackLabels[code] || code;
          select.appendChild(option);
        }
        select.value = currencyOrder[0];
        select.addEventListener("change", () => renderSelectedCurrency(currentPayload));
      } else if (select) {
        for (const option of select.options) {
          const code = String(option.value || "").toUpperCase();
          option.textContent = byCode.get(code)?.name || fallbackLabels[code] || code;
        }
      }

      for (const code of currencyOrder) {
        const item = byCode.get(code) || {};
        const label = item.name || fallbackLabels[code];
        const rate = item.rate;

        const labelNode = document.getElementById(`label-${code.toLowerCase()}`);
        const rateNode = document.getElementById(`rate-${code.toLowerCase()}`);

        if (labelNode) {
          labelNode.textContent = label;
        }
        if (rateNode) {
          rateNode.textContent = formatCurrency(rate);
        }
      }

      renderSelectedCurrency(payload);

      const footer = document.querySelector(".footer");
      if (footer) {
        footer.textContent = `Atualizado em: ${formatTimestamp(payload?.updated_at)}`;
      }
    }

    function renderSelectedCurrency(payload) {
      const select = document.getElementById("currency-select");
      const selectedCode = String(select?.value || currencyOrder[0]).toUpperCase();
      const rates = Array.isArray(payload?.rates) ? payload.rates : [];
      const byCode = new Map(rates.map((item) => [String(item.code || "").toUpperCase(), item]));
      const selected = byCode.get(selectedCode);
      const brlValue = selected?.brl_per_unit;
      const label = selected?.name || fallbackLabels[selectedCode] || selectedCode;

      const valueNode = document.getElementById("brl-value");
      const captionNode = document.getElementById("brl-caption");

      if (valueNode) {
        valueNode.textContent = brlValue == null ? "R$ --" : formatCurrency(brlValue);
      }

      if (captionNode) {
        captionNode.textContent = brlValue == null
          ? `Não foi possível calcular o valor em BRL para ${label}.`
          : `1 ${selectedCode} = ${formatCurrency(brlValue)}.`;
      }

      for (const row of document.querySelectorAll(".row")) {
        row.classList.remove("selected-row");
      }

      const activeLeft = document.getElementById(`label-${selectedCode.toLowerCase()}`);
      const activeRight = document.getElementById(`rate-${selectedCode.toLowerCase()}`);
      if (activeLeft) activeLeft.classList.add("selected-row");
      if (activeRight) activeRight.classList.add("selected-row");
    }

    async function carregarCambio() {
      const status = document.getElementById("status");

      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        applyRates(payload);

        if (status) {
          status.textContent = `Fonte online: ${payload?.source || API_URL}`;
        }
      } catch (error) {
        if (status) {
          status.textContent = "API indisponível. Mantendo os valores atuais da tela.";
        }
        console.error(error);
      }
    }

    carregarCambio();
  </script>
</body>
</html>
